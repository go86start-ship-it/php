<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ログインページ</title>
    <style>
        /* 簡単なスタイリング（ReactのMUI風） */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(to bottom right, #f0f7ff, #e0e7ff);
            font-family: sans-serif;
        }
        .login-card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 350px;
            text-align: center;
        }
        .icon-circle {
            width: 60px;
            height: 60px;
            background-color: #1976d2;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 20px;
            color: white;
            font-size: 24px;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box; /* 幅がはみ出さないように */
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #1976d2;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
        }
        button:hover {
            background-color: #1565c0;
        }
        .footer-link {
            margin-top: 15px;
            font-size: 14px;
            color: #1976d2;
            text-align: right;
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="icon-circle">🔒</div>
    <h2>ログイン</h2>
    <p style="color: #666; font-size: 14px;">アカウント情報を入力してください</p>

    <!-- actionにデータを送るPHPファイル名を指定します -->
    <form action="index.php" method="POST">
        <input type="text" name="user_id" placeholder="ユーザーID（またはメール）" required>
        <input type="password" name="password" placeholder="パスワード" required>
        <button type="submit">ログイン</button>
    </form>

    <div class="footer-link">
        <a href="#" style="text-decoration: none; color: inherit;">新規登録</a>
    </div>
</div>

</body>
</html>
